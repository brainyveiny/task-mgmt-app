<div class="auth-container">
    <div class="auth-card">
        <h2>Create account</h2>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" formControlName="username" placeholder="johndoe"
                    [class.invalid]="username.invalid && username.touched" />
                @if (username.invalid && username.touched) {
                    <div class="field-error">
                        Username must be at least 3 characters.
                    </div>
                }
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" placeholder="you@example.com"
                    [class.invalid]="email.invalid && email.touched" />
                @if (email.invalid && email.touched) {
                    <div class="field-error">
                        Invalid email.
                    </div>
                }
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••"
                    [class.invalid]="password.invalid && password.touched" />
                @if (password.invalid && password.touched) {
                    <div class="field-error">
                        Invalid password.
                    </div>
                }
            </div>
            <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || loading">
                @if (!loading) { <div>Create Account</div> }
                @if (loading) { <div>Creating...</div> }
            </button>
        </form>
        <div class="auth-link">
            Already have an account? <a routerLink="/login">Sign in</a>
        </div>
    </div>
</div>
