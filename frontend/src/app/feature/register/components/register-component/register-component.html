<div class="auth-container">
    <div class="auth-card">
        <h2>Create account</h2>

        <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>
        <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" formControlName="username" placeholder="johndoe"
                    [class.invalid]="username.invalid && username.touched" />
                <span class="field-error" *ngIf="username.invalid && username.touched">
                    Username must be at least 3 characters.
                </span>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" placeholder="you@example.com"
                    [class.invalid]="email.invalid && email.touched" />
                <span class="field-error" *ngIf="email.invalid && email.touched">
                    Invalid email.
                </span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••"
                    [class.invalid]="password.invalid && password.touched" />
                <span class="field-error" *ngIf="password.invalid && password.touched">
                    Invalid password.
                </span>
            </div>

            <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || loading">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading">Creating...</span>
            </button>
        </form>

        <p class="auth-link">
            Already have an account? <a routerLink="/login">Sign in</a>
        </p>
    </div>
</div>
