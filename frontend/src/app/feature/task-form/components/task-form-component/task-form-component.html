<div class="form-page">
    <div class="form-card">
        <a class="back-link" routerLink="/dashboard">&larr; Back</a>
        <h2>{{ isEditMode ? 'Edit Task' : 'Create Task' }}</h2>
        <div class="form-subtitle">
            {{ isEditMode ? 'Update task details below' : 'Fill in the details for your new task' }}
        </div>
        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" novalidate>
            <div class="form-group">
                <label for="task-title">Title *</label>
                <input id="task-title" type="text" formControlName="title" [class.invalid]="title.invalid && title.touched" />
                @if (title.invalid && title.touched) { <div class="field-error">Title must be at least 3 characters.</div> }
            </div>
            <div class="form-group">
                <label for="task-description">Description</label>
                <textarea id="task-description" formControlName="description" rows="4"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="task-status">Status</label>
                    <select id="task-status" formControlName="status">
                        <option value="TODO">To Do</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="DONE">Done</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" formControlName="priority">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="task-due-date">Due Date</label>
                <input id="task-due-date" type="date" formControlName="due_date" [min]="minDate" />
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="taskForm.invalid || loading">
                    @if (!loading) { <div>{{ isEditMode ? 'Update Task' : 'Create Task' }}</div> }
                    @if (loading) { <div>Saving...</div> }
                </button>
            </div>
        </form>
    </div>
</div>
