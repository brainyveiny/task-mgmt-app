<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <div class="alert alert-error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="email.invalid && email.touched"
        />
        <span class="field-error" *ngIf="email.invalid && email.touched">
          Invalid email.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalid]="password.invalid && password.touched"
        />
        <span class="field-error" *ngIf="password.invalid && password.touched">
          Invalid password.
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner">Signing in...</span>
      </button>
    </form>

    <p class="auth-link">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
